<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { text-align: center; padding: 40px; }
        .code { font-size: 120px; font-weight: 700; color: #2563EB; line-height: 1; }
        .title { font-size: 24px; font-weight: 600; color: #1E293B; margin: 16px 0 8px; }
        .desc { color: #64748B; margin-bottom: 24px; }
        .btn { display: inline-block; padding: 12px 24px; background: #2563EB; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; }
        .btn:hover { background: #1D4ED8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1 class="title">Page Not Found</h1>
        <p class="desc">The page you're looking for doesn't exist.</p>
        <a href="/" class="btn">Go to Dashboard</a>
    </div>
</body>
</html>
